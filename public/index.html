<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orgadata - Portal de Treinamentos</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon/favicon-16x16.png">
    <link rel="icon" href="./img/favicon/favicon.ico" sizes="any">
    <link rel="manifest" href="./img/favicon/site.webmanifest">
    <meta name="theme-color" content="#0b1120">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #f6a91e;
            --brand-dark: #df8f07;
            --ink: #0b1120;
            --steel: #1e293b;
            --frost: rgba(15, 23, 42, 0.72);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-image:
                radial-gradient(circle at 10% 15%, rgba(8, 145, 178, 0.18), transparent 30%),
                radial-gradient(circle at 82% 88%, rgba(249, 115, 22, 0.2), transparent 24%),
                linear-gradient(180deg, rgba(2, 6, 23, 0.72), rgba(2, 6, 23, 0.82)),
                url('./img/BG.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            scrollbar-width: auto;
            scrollbar-color: rgba(148, 163, 184, 0.38) rgba(148, 163, 184, 0.10);
        }

        body.menu-open {
            overflow: hidden;
        }

        .sidebar-active {
            background: linear-gradient(90deg, rgba(246, 169, 30, 0.2), rgba(246, 169, 30, 0.05));
            color: #f8fafc;
            border-right: 4px solid var(--brand);
        }

        .sidebar-btn {
            color: #cbd5e1;
            white-space: nowrap;
        }

        .sidebar-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
        }

        .matrix-table th,
        .matrix-table td {
            border: 1px solid #f1f5f9;
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background-color: white;
            z-index: 10;
            overflow: hidden;
            border-right: 2px solid #f1f5f9 !important;
        }

        ::-webkit-scrollbar {
            width: 14px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(51, 65, 85, 0.26);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 0.68);
            border-radius: 999px;
            border: 3px solid rgba(15, 23, 42, 0.08);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(30, 41, 59, 0.86);
        }

        .fixed-scroll-target,
        .matrix-scroll {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .fixed-scroll-target::-webkit-scrollbar,
        .matrix-scroll::-webkit-scrollbar {
            height: 0;
            width: 0;
        }

        .matrix-fixed-scroll {
            scrollbar-width: auto;
            scrollbar-color: #1e293b #94a3b8;
        }

        .matrix-fixed-scroll::-webkit-scrollbar {
            height: 20px;
        }

        .matrix-fixed-scroll::-webkit-scrollbar-track {
            background: #94a3b8;
            border-radius: 999px;
        }

        .matrix-fixed-scroll::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 999px;
            border: 4px solid #94a3b8;
        }

        .matrix-fixed-scroll::-webkit-scrollbar-thumb:hover {
            background: #0f172a;
        }

        .matrix-filter-dropdown summary::-webkit-details-marker {
            display: none;
        }

        .matrix-filter-chevron {
            color: #94a3b8;
            transition: transform 0.2s ease;
        }

        .matrix-filter-dropdown[open] .matrix-filter-chevron {
            transform: rotate(180deg);
        }

        .dashboard-pie-enter {
            animation: dashboardPieIn 0.55s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .dashboard-pie-card {
            width: 100%;
        }

        .dashboard-pie-slice-group {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .dashboard-pie-slice-group:focus,
        .dashboard-pie-slice-group:focus-visible {
            outline: none;
        }

        .dashboard-pie-slice-path {
            transition: stroke 0.2s ease, stroke-width 0.2s ease, opacity 0.2s ease;
        }

        .dashboard-pie-slice-label {
            pointer-events: none;
        }

        .dashboard-pie-slice-group.is-active .dashboard-pie-slice-path {
            stroke: #ffffff;
            stroke-width: 2.2;
            opacity: 1;
        }

        .dashboard-pie-slice-group.is-dimmed {
            opacity: 0.48;
        }

        .dashboard-pie-slice-group:focus-visible .dashboard-pie-slice-path {
            stroke: #0f172a;
            stroke-width: 2.2;
            opacity: 1;
        }

        @keyframes dashboardPieIn {
            from {
                opacity: 0;
                transform: scale(0.88) rotate(-12deg);
            }

            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        @keyframes cellSavedFlash {
            0%   { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.65); background: rgba(16, 185, 129, 0.18); }
            55%  { box-shadow: 0 0 0 7px rgba(16, 185, 129, 0); background: rgba(16, 185, 129, 0.06); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); background: transparent; }
        }

        .cell-saved-flash {
            animation: cellSavedFlash 0.7s ease-out;
        }

        .animate-fade-in {
            animation: fadeIn 0.25s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bg-indigo-600 {
            background-color: var(--brand) !important;
        }

        .hover\:bg-indigo-700:hover {
            background-color: var(--brand-dark) !important;
        }

        .text-indigo-600 {
            color: var(--brand) !important;
        }

        .bg-indigo-50 {
            background-color: #fff7e6 !important;
        }

        .border-indigo-600 {
            border-color: var(--brand) !important;
        }

        .focus\:border-indigo-400:focus {
            border-color: #f8c96b !important;
        }

        .shadow-indigo-100 {
            --tw-shadow-color: rgba(246, 169, 30, 0.28) !important;
        }

        .mobile-menu-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s ease;
        }

        .mobile-menu-overlay[data-open="true"] {
            opacity: 1;
            pointer-events: auto;
        }

        .mobile-menu-panel {
            transform: translateX(-105%);
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .mobile-menu-overlay[data-open="true"] .mobile-menu-panel {
            transform: translateX(0);
        }

        /* Scrollbar vertical das tabelas de usuários — baixa opacidade */
        .users-table-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(71, 85, 105, 0.75) rgba(51, 65, 85, 0.18);
        }

        .users-table-scroll::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        .users-table-scroll::-webkit-scrollbar-track {
            background: rgba(51, 65, 85, 0.14);
        }

        .users-table-scroll::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.68);
            border-radius: 999px;
        }

        .users-table-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(51, 65, 85, 0.86);
        }

        @media (max-width: 1023px) {
            body {
                background-attachment: scroll;
            }

            .fixed-scroll-target,
            .matrix-scroll {
                scrollbar-width: thin;
                -ms-overflow-style: auto;
            }

            .fixed-scroll-target::-webkit-scrollbar,
            .matrix-scroll::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }

            .fixed-scroll-target::-webkit-scrollbar-track,
            .matrix-scroll::-webkit-scrollbar-track {
                background: rgba(51, 65, 85, 0.30);
                border-radius: 999px;
            }

            .fixed-scroll-target::-webkit-scrollbar-thumb,
            .matrix-scroll::-webkit-scrollbar-thumb {
                background: #475569;
                border-radius: 999px;
                border: 2px solid rgba(15, 23, 42, 0.1);
            }
        }
    </style>
</head>
<body class="text-slate-900">
    <div id="auth-view" class="min-h-screen hidden"></div>

    <div id="app-shell" class="hidden">
        <div class="flex min-h-screen">
            <aside class="fixed left-0 top-0 h-full w-64 bg-slate-950/65 border-r border-slate-700/60 z-40 hidden lg:flex flex-col shadow-2xl backdrop-blur-xl">
                <div class="p-8">
                    <div class="mb-10 space-y-3">
                        <div class="rounded-2xl px-1 py-1">
                            <img src="./img/logo-branca.png" alt="Orgadata" class="w-full h-auto max-h-16 object-contain">
                        </div>
                        <h1 class="text-sm font-black tracking-[0.12em] text-slate-200 uppercase">Portal de Treinamentos</h1>
                    </div>

                    <nav class="space-y-2">
                        <button onclick="switchTab('public-overview')" id="nav-public-overview" data-nav-tab="public-overview" class="sidebar-btn public-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200 sidebar-active">
                            <i data-lucide="table-properties" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Tabela Pública</span>
                        </button>
                        <button onclick="switchTab('dashboard')" id="nav-dashboard" data-nav-tab="dashboard" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Dashboard</span>
                        </button>
                        <button onclick="switchTab('categories')" id="nav-categories" data-nav-tab="categories" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="layers" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Categorias &amp; Módulos</span>
                        </button>
                        <button onclick="switchTab('report')" id="nav-report" data-nav-tab="report" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="file-spreadsheet" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Editar Status</span>
                        </button>
                        <button onclick="switchTab('users')" id="nav-users" data-nav-tab="users" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="users" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Usuários</span>
                        </button>
                    </nav>
                </div>
                <div class="mt-auto p-8 border-t border-white/10">
                    <div id="sidebar-public-block" class="public-session-block hidden bg-white/10 rounded-2xl p-4 space-y-3 border border-white/10">
                        <div>
                            <p class="text-xs text-slate-300 font-bold uppercase tracking-[0.24em]">Acesso</p>
                            <p class="text-sm font-bold text-slate-100">Painel administrativo</p>
                        </div>
                        <button onclick="openAdminLoginModal()" class="w-full px-4 py-2.5 text-sm font-bold text-slate-950 bg-amber-400 border border-amber-400 rounded-xl hover:bg-amber-300 transition-all">
                            Painel de Admin
                        </button>
                    </div>
                    <div id="sidebar-session-block" class="auth-session-block bg-white/10 rounded-2xl p-4 space-y-3 border border-white/10">
                        <div>
                            <p class="text-xs text-slate-300 font-bold uppercase tracking-[0.24em]">Sessão</p>
                            <p id="sidebar-session-email" data-session-email class="text-sm font-bold text-slate-100 break-all">-</p>
                        </div>
                        <button onclick="openModal('change-password')" class="w-full px-4 py-2.5 text-sm font-bold text-slate-100 bg-amber-500/30 border border-amber-300/40 rounded-xl hover:border-amber-200/70 hover:bg-amber-500/45 transition-all">
                            Alterar Senha
                        </button>
                        <button onclick="logout()" class="w-full px-4 py-2.5 text-sm font-bold text-slate-100 bg-slate-900/40 border border-white/20 rounded-xl hover:border-white/40 hover:bg-slate-900/65 transition-all">
                            Sair
                        </button>
                    </div>
                </div>
            </aside>

            <div id="mobile-menu-overlay" data-open="false" class="mobile-menu-overlay fixed inset-0 z-[65] lg:hidden">
                <button type="button" aria-label="Fechar menu" onclick="closeMobileMenu()" class="absolute inset-0 bg-slate-950/60 backdrop-blur-[2px]"></button>
                <aside class="mobile-menu-panel relative z-10 h-full w-[86vw] max-w-[340px] bg-slate-950/95 border-r border-slate-700/70 shadow-2xl flex flex-col">
                    <div class="p-5 border-b border-white/10 flex items-center justify-between gap-3">
                        <div class="flex items-center gap-3 min-w-0">
                            <img src="./img/logo-branca.png" alt="Orgadata" class="w-28 h-auto object-contain">
                            <p class="text-[11px] leading-4 font-black tracking-[0.14em] text-slate-200 uppercase">Portal de Treinamentos</p>
                        </div>
                        <button type="button" onclick="closeMobileMenu()" class="p-2 rounded-lg text-slate-300 hover:bg-white/10">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <nav class="p-4 space-y-2 overflow-y-auto">
                        <button onclick="switchTabFromMenu('public-overview')" data-nav-tab="public-overview" class="sidebar-btn public-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200 sidebar-active">
                            <i data-lucide="table-properties" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Tabela Pública</span>
                        </button>
                        <button onclick="switchTabFromMenu('dashboard')" data-nav-tab="dashboard" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Dashboard</span>
                        </button>
                        <button onclick="switchTabFromMenu('categories')" data-nav-tab="categories" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="layers" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Categorias &amp; Módulos</span>
                        </button>
                        <button onclick="switchTabFromMenu('report')" data-nav-tab="report" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="file-spreadsheet" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Editar Status</span>
                        </button>
                        <button onclick="switchTabFromMenu('users')" data-nav-tab="users" class="sidebar-btn admin-only w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[15px] font-semibold transition-all duration-200">
                            <i data-lucide="users" class="w-5 h-5 shrink-0"></i>
                            <span class="min-w-0 truncate">Usuários</span>
                        </button>
                    </nav>
                    <div class="mt-auto p-4 border-t border-white/10">
                        <div class="public-session-block hidden bg-white/10 rounded-2xl p-4 space-y-3 border border-white/10">
                            <div>
                                <p class="text-xs text-slate-300 font-bold uppercase tracking-[0.24em]">Acesso</p>
                                <p class="text-sm font-bold text-slate-100">Painel administrativo</p>
                            </div>
                            <button onclick="openAdminLoginModal(); closeMobileMenu();" class="w-full px-4 py-2.5 text-sm font-bold text-slate-950 bg-amber-400 border border-amber-400 rounded-xl hover:bg-amber-300 transition-all">
                                Painel de Admin
                            </button>
                        </div>
                        <div class="auth-session-block bg-white/10 rounded-2xl p-4 space-y-3 border border-white/10">
                            <div>
                                <p class="text-xs text-slate-300 font-bold uppercase tracking-[0.24em]">Sessão</p>
                                <p data-session-email class="text-sm font-bold text-slate-100 break-all">-</p>
                            </div>
                            <button onclick="openModal('change-password'); closeMobileMenu();" class="w-full px-4 py-2.5 text-sm font-bold text-slate-100 bg-amber-500/30 border border-amber-300/40 rounded-xl hover:border-amber-200/70 hover:bg-amber-500/45 transition-all">
                                Alterar Senha
                            </button>
                            <button onclick="logout(); closeMobileMenu();" class="w-full px-4 py-2.5 text-sm font-bold text-slate-100 bg-slate-900/40 border border-white/20 rounded-xl hover:border-white/40 hover:bg-slate-900/65 transition-all">
                                Sair
                            </button>
                        </div>
                    </div>
                </aside>
            </div>

            <main class="w-full min-w-0 flex flex-col lg:ml-64 lg:w-[calc(100%-16rem)]">
                <header class="sticky top-0 bg-slate-950/55 backdrop-blur-md border-b border-white/10 z-30 px-4 sm:px-6 lg:px-8 py-3 sm:py-4 flex items-center justify-between gap-3 sm:gap-4 min-w-0">
                    <button type="button" onclick="toggleMobileMenu()" class="lg:hidden shrink-0 p-2 rounded-xl bg-white/10 border border-white/20 text-slate-100 hover:bg-white/15">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <div class="flex items-center gap-3 bg-white/10 px-3 sm:px-4 py-2 rounded-full w-full max-w-md min-w-0 border border-white/10">
                        <i data-lucide="search" class="w-5 h-5 text-slate-300"></i>
                        <input type="text" id="global-search" oninput="handleSearch(this.value)" placeholder="Pesquisar por nome..." class="bg-transparent border-none focus:ring-0 text-sm w-full outline-none text-slate-100 placeholder:text-slate-400 min-w-0">
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3 ml-1 sm:ml-2">
                        <div class="text-right hidden md:block">
                            <p id="header-mode-title" class="text-sm font-bold text-slate-100">Painel Administrativo</p>
                            <p id="header-session-email" class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">Gestão de conteúdo</p>
                        </div>
                        <span id="sync-indicator" class="hidden px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-amber-50 text-amber-700 border border-amber-200 animate-pulse">
                            Sincronizando...
                        </span>
                        <div class="w-10 h-10 rounded-xl bg-white/10 border border-white/20 shadow-sm overflow-hidden flex items-center justify-center text-slate-100">
                            <i data-lucide="shield-check" class="w-5 h-5"></i>
                        </div>
                    </div>
                </header>

                <div id="main-view" class="p-4 sm:p-6 lg:p-8 max-w-[1400px] mx-auto w-full min-w-0 box-border"></div>
            </main>
        </div>
    </div>

    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 w-full max-w-2xl overflow-hidden animate-fade-in">
            <div class="flex items-center justify-between p-6 border-b border-slate-50 bg-slate-50/50">
                <h3 id="modal-title" class="text-xl font-bold text-slate-800">Título do Modal</h3>
                <button onclick="closeModal()" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="modal-content" class="p-6"></div>
        </div>
    </div>

    <div id="confirm-dialog" class="fixed inset-0 z-[90] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="dismissConfirmDialog()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl border border-slate-100 p-6 w-full max-w-sm animate-fade-in space-y-4">
            <div class="flex items-start gap-3">
                <span id="confirm-dialog-icon" class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 bg-red-50 text-red-500">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                </span>
                <div>
                    <p id="confirm-dialog-title" class="font-bold text-slate-800 text-sm"></p>
                    <p id="confirm-dialog-message" class="mt-1 text-sm text-slate-500"></p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="dismissConfirmDialog()" class="flex-1 py-2.5 bg-white border border-slate-200 text-slate-600 font-bold rounded-xl text-sm hover:bg-slate-50 transition-colors">Cancelar</button>
                <button id="confirm-dialog-ok" onclick="resolveConfirmDialog()" class="flex-1 py-2.5 font-bold rounded-xl text-sm transition-colors">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 left-3 right-3 sm:left-auto sm:right-4 z-[60] flex flex-col gap-3"></div>
    <div id="matrix-scrollbar-dock" class="hidden fixed bottom-2 z-[55]">
        <div
            id="matrix-scrollbar-track"
            class="matrix-fixed-scroll h-5 overflow-x-auto rounded-full border border-slate-300 bg-slate-200/90 shadow-lg"
            aria-label="Barra de rolagem horizontal da matriz"
        >
            <div id="matrix-scrollbar-inner" class="h-px"></div>
        </div>
    </div>

    <script src="./supabase-config.js"></script>
    <script type="module" src="./firebase-config.js"></script>
    <script src="./js/app/01-core.js"></script>
    <script src="./js/app/02-rendering.js"></script>
    <script src="./js/app/03-modals-users.js"></script>
    <script src="./js/app/04-actions-init.js"></script>
</body>
</html>
